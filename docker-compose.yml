services:
  # ========== 基础设施 ==========

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: smartauto-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: smartauto123
      MYSQL_DATABASE: smartauto_oa
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_general_ci
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command: --default-authentication-plugin=caching_sha2_password --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-psmartauto123"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartauto-net

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: smartauto-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --requirepass smartauto123 --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "smartauto123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartauto-net

  # MinIO 文件存储
  minio:
    image: minio/minio:latest
    container_name: smartauto-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - smartauto-net

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: smartauto-rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - smartauto-net

  # Elasticsearch 全文检索
  elasticsearch:
    image: elasticsearch:8.13.0
    container_name: smartauto-es
    restart: always
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - cluster.name=smartauto-es
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - smartauto-net

  # ========== 应用服务 ==========

  # 后端 Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartauto-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: smartauto_oa
      MYSQL_USER: root
      MYSQL_PASS: smartauto123
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASS: smartauto123
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET_NAME: smartauto-oa
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      ES_URIS: http://elasticsearch:9200
      JWT_SECRET: SmartAutoOA-2026-Secret-Key-Must-Be-32Bytes-Long!
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      rabbitmq:
        condition: service_started
      elasticsearch:
        condition: service_started
    networks:
      - smartauto-net

  # 前端 Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartauto-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - smartauto-net

volumes:
  mysql_data:
  redis_data:
  minio_data:
  rabbitmq_data:
  es_data:

networks:
  smartauto-net:
    driver: bridge
